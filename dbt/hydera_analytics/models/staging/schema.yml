version: 2

sources:
  - name: raw
    description: Raw tables loaded by ingest.py from RERA portal and Telangana open data
    schema: public
    tables:
      - name: raw_rera_projects
        description: RERA-registered projects scraped from rera.telangana.gov.in
        columns:
          - name: project_id
            tests: [not_null, unique]
          - name: builder_name
            tests: [not_null]
          - name: registration_date
            tests: [not_null]

      - name: raw_rera_complaints
        description: Complaint and grievance records from RERA portal
        columns:
          - name: complaint_id
            tests: [not_null, unique]

      - name: raw_property_registrations
        description: Property sale deed registrations from data.opencity.in
        columns:
          - name: registration_doc_no
            tests: [not_null]

models:
  - name: stg_projects
    description: Cleaned RERA project records — one row per project
    columns:
      - name: project_id
        tests: [not_null, unique]
      - name: builder_name_raw
        tests: [not_null]
      - name: registration_date
        tests: [not_null]

  - name: stg_builders
    description: Deduplicated builder dimension
    columns:
      - name: builder_id
        tests: [not_null, unique]
      - name: builder_key
        tests: [not_null, unique]

  - name: stg_complaints
    description: Cleaned complaint records
    columns:
      - name: complaint_id
        tests: [not_null, unique]

  - name: stg_transactions
    description: Cleaned property sale deed registrations
    columns:
      - name: transaction_id
        tests: [not_null, unique]
      - name: price_per_sqft
        tests: [not_null]
